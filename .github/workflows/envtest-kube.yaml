name: Envtest Vanilla Kube API Validation

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'test/envtest/**'
      - 'cmd/install/assets/hypershift-operator/tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'test/envtest/**'
      - 'cmd/install/assets/hypershift-operator/tests/**'
  workflow_dispatch: {}

jobs:
  authorize:
    uses: ./.github/workflows/authorize-pr.yaml

  envtest-kube:
    name: Envtest Vanilla Kube ${{ matrix.version }}
    needs: [authorize]
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: arc-runner-set
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        version: ["1.31.0", "1.32.0", "1.33.0", "1.34.0", "1.35.0"]
    steps:
      - uses: actions/checkout@v6
      - run: make test-envtest-kube ENVTEST_KUBE_VERSIONS="${{ matrix.version }}"
