name: CPO Container Sync

on:
  pull_request:
    branches: [main]

jobs:
  authorize:
    uses: ./.github/workflows/authorize-pr.yaml

  cpo-container-sync:
    name: CPO Container Sync
    needs: [authorize]
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: make cpo-container-sync
