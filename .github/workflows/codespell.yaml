name: Codespell

on:
  pull_request:
    branches: [main]

jobs:
  authorize:
    uses: ./.github/workflows/authorize-pr.yaml

  codespell:
    name: Codespell
    needs: [authorize]
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: make verify-codespell
